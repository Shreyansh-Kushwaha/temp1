<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8526"/>
      <stop offset="1" stop-color="#FF6B1F"/>
    </linearGradient>
  </defs>
  <!-- Brand tile -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#ss-bg)"/>

  <!-- Graduation cap, drawn as solid white shapes for crisp rendering at 16px -->

  <!-- Mortarboard top (rhombus / square in perspective) -->
  <path d="M32 13 L55 24 L32 35 L9 24 Z" fill="#FFFFFF"/>

  <!-- Cap band underneath, with a slight curve so it reads as a head -->
  <path d="M21 28 L21 39 C21 42.5 26 45 32 45 C38 45 43 42.5 43 39 L43 28 L32 33 Z" fill="#FFFFFF"/>

  <!-- Subtle inner shadow on the band so it separates from the mortarboard -->
  <path d="M21.5 28.5 L32 33 L42.5 28.5 L42.5 30 L32 34.5 L21.5 30 Z" fill="#FF6B1F" opacity="0.20"/>

  <!-- Tassel: thin line + bead, hanging from the board's right corner -->
  <path d="M50 25 L50 40" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="42" r="2.4" fill="#FFFFFF"/>
</svg>
